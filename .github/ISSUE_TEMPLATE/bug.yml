name: 运行问题
description: 报告无法启动、界面异常或功能错误
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请不要上传访问令牌、私人项目源码或其他敏感信息。
  - type: dropdown
    id: version
    attributes:
      label: 使用版本
      options: [Windows 本地完整版, Mac / 网页轻版]
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: 系统与屏幕缩放
      placeholder: 例如 Windows 11 24H2，缩放 150%
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 从下载、解压或打开网页开始，逐步描述发生了什么
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 截图或错误信息
      description: 上传前请遮住用户名、路径和私人内容
