<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="给普通中文用户使用的 Codex Skill 助手：把模糊需求整理成可执行、可验收的提示词。">
  <title>Codex Skill 中文助手 · 网页轻版</title>
  <style>
    :root{color-scheme:dark;--bg:#111012;--panel:#19181a;--line:#3a383c;--text:#f4f2f5;--muted:#aaa6ad;--soft:#242326;--green:#74c69d}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0,#29262b 0,#141315 42%,#0d0c0e 100%);font-family:"PingFang SC","Microsoft YaHei UI",system-ui,sans-serif;color:var(--text);display:grid;place-items:center;padding:24px}
    .app{width:min(100%,520px);background:rgba(22,21,23,.96);border:1px solid #4a474d;border-radius:18px;box-shadow:0 24px 80px #0009;overflow:hidden}
    header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px}.brand{font-size:18px;font-weight:700}.tag{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 9px}
    .notice{margin:0 18px 14px;padding:10px 12px;border:1px solid #355344;background:#17231d;border-radius:10px;color:#a8d5bc;font-size:12px;line-height:1.6}
    .modes{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:0 18px 12px;padding:4px;border:1px solid var(--line);border-radius:11px;background:#151416}.mode{appearance:none;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:8px;padding:8px 4px;cursor:pointer;font:inherit;font-size:12px}.mode.active{color:white;border-color:#7a767e;background:#222124;font-weight:700}
    .input-wrap{display:grid;grid-template-columns:1fr auto;gap:8px;margin:0 18px 14px}.input-wrap textarea{resize:vertical;min-height:86px;background:#1b1a1d;border:1px solid #4c4950;border-radius:12px;color:white;padding:12px;font:inherit;line-height:1.6;outline:none}.input-wrap textarea:focus{border-color:#aaa4ae}.primary{border:0;border-radius:12px;background:#f0eef1;color:#161517;font:inherit;font-weight:700;padding:0 16px;cursor:pointer}.primary:hover{background:white}
    .section{border-top:1px solid #302e32;padding:14px 18px}.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;font-size:13px;font-weight:700}.section-title span{font-size:11px;color:var(--muted);font-weight:400}.results{display:grid;gap:7px}.skill{padding:9px 10px;background:#1b1a1d;border:1px solid #302e32;border-radius:10px}.skill strong{font-size:13px}.skill p{margin:4px 0 0;color:var(--muted);font-size:11px;line-height:1.5}
    .output{white-space:pre-wrap;background:#0f0e10;border:1px solid #373439;border-radius:11px;min-height:120px;max-height:260px;overflow:auto;padding:12px;color:#d9d6dc;font-size:12px;line-height:1.65}.actions{display:flex;gap:8px;margin-top:10px}.actions button{flex:1;border:1px solid #4b484e;background:#242326;color:white;border-radius:9px;padding:9px;cursor:pointer}.actions button:last-child{background:#eeeaf0;color:#151416;font-weight:700}
    footer{padding:12px 18px 16px;color:#77737b;font-size:11px;line-height:1.5;text-align:center}a{color:#b8d8c5}
    @media(max-width:440px){body{padding:8px}.app{border-radius:14px}.modes{grid-template-columns:repeat(2,1fr)}.input-wrap{grid-template-columns:1fr}.primary{min-height:44px}}
  </style>
</head>
<body>
<main class="app">
  <header><div class="brand">Codex Skill 中文助手</div><div class="tag">Mac / 网页轻版</div></header>
  <div class="notice">无需安装，直接使用核心提示词整理。出于浏览器权限限制，本版本不会读取本机额度，也不会扫描本地 Skills。</div>
  <nav class="modes" aria-label="工作模式">
    <button class="mode active" data-mode="托管任务">托管任务</button><button class="mode" data-mode="产品判断">产品判断</button><button class="mode" data-mode="UI 检查">UI 检查</button><button class="mode" data-mode="能力库">能力库</button>
  </nav>
  <div class="input-wrap"><textarea id="task" placeholder="用普通中文说出你想做什么…">Codex 做出来的页面和原型不一样，但我不知道该怎么说</textarea><button class="primary" id="generate">帮我整理</button></div>
  <section class="section"><div class="section-title">推荐能力 <span id="count"></span></div><div class="results" id="results"></div></section>
  <section class="section"><div class="section-title">可以直接交给 Codex</div><div class="output" id="output"></div><div class="actions"><button id="reset">换一个说法</button><button id="copy">复制提示词</button></div></section>
  <footer>你的输入只在当前浏览器中处理，不会上传。<a href="https://github.com/linjiangqiyue/codex-skill-widget">查看开源项目</a></footer>
</main>
<script>
const skills=[
 {name:'problem-framing-canvas',use:'梳理问题边界、用户目标和真正需要解决的核心问题',m:['托管任务','产品判断']},
 {name:'craft-spec',use:'把零散想法整理成清晰、可执行的产品需求',m:['托管任务','产品判断']},
 {name:'agent-orchestration-advisor',use:'设计任务分工、交接、监控和失败处理',m:['托管任务']},
 {name:'product-design:audit',use:'依据真实截图检查产品流程、UI 细节和可访问性',m:['UI 检查']},
 {name:'design-system',use:'统一颜色、字体、间距和组件状态',m:['UI 检查']},
 {name:'code-review-excellence',use:'系统审查代码质量、风险和具体缺陷',m:['托管任务','UI 检查']},
 {name:'verification-before-completion',use:'完成前核对证据，防止未经验证就宣布完成',m:['托管任务','产品判断','UI 检查']},
 {name:'prd',use:'整理产品目标、功能范围、异常状态和验收标准',m:['产品判断']},
 {name:'prioritization-advisor',use:'判断功能优先级、成本和用户价值',m:['产品判断']},
 {name:'skill-installer',use:'从可信目录或 GitHub 安装 Codex Skills',m:['能力库']},
 {name:'e2e-testing-patterns',use:'用端到端测试验证真实用户流程',m:['UI 检查']},
 {name:'architecture-patterns',use:'检查代码结构、模块边界和工程方案',m:['托管任务']}
];
let mode='托管任务';
const $=id=>document.getElementById(id);
function chosen(){return mode==='能力库'?skills:skills.filter(s=>s.m.includes(mode)).slice(0,6)}
function contract(){
 if(mode==='产品判断')return '禁止奉承。先区分事实、推断和建议，再检查用户目标、功能范围、流程、异常状态和决策风险。每个问题说明证据、影响、建议和优先级。';
 if(mode==='UI 检查')return '开始前必须取得并查看截图、原型或现有界面。检查裁切、溢出、对齐、间距、字体、圆角、颜色和不同窗口尺寸；修改后提供同状态截图再次验收。';
 if(mode==='能力库')return '先解释选择这些能力的原因、各自负责什么以及执行顺序，只选择完成任务所需的最小组合。';
 return '先整理目标、不可改变项、执行步骤、风险边界和验收标准。新增页面、删除或覆盖重要内容、偏离原型时必须暂停并用通俗中文询问。';
}
function render(){const list=chosen();$('count').textContent=mode==='能力库'?`共 ${list.length} 项示例`:`推荐 ${list.length} 项`;$('results').innerHTML=list.map((s,i)=>`<div class="skill"><strong>${String(i+1).padStart(2,'0')}　${s.name}</strong><p>用途：${s.use}</p></div>`).join('');const task=$('task').value.trim()||'请根据我的下一条中文需求整理任务';$('output').textContent=`任务：${task}\n工作模式：${mode}\n\n优先使用：${list.map(s=>s.name).join('、')}。\n\n${contract()}\n\n开始前先检查现有项目和相似组件，不要擅自扩大范围。完成后用中文报告修改内容、验证证据、仍存在的限制，以及真正需要我决定的事项。`;}
document.querySelectorAll('.mode').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;render()}));
$('generate').addEventListener('click',render);$('reset').addEventListener('click',()=>{$('task').value='';$('task').focus();render()});$('copy').addEventListener('click',async()=>{await navigator.clipboard.writeText($('output').textContent);$('copy').textContent='已复制';setTimeout(()=>$('copy').textContent='复制提示词',1400)});render();
</script>
</body>
</html>
